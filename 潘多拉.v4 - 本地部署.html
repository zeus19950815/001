<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外观设计专利 · 六视图标准化工具</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ========== 基础变量与深色主题（默认） ========== */
:root {
  --bg-primary: #080c16;
  --bg-secondary: rgba(15,23,42,.5);
  --bg-sidebar: rgba(15,23,42,.3);
  --border-color: rgba(14,165,233,.1);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --accent: #38bdf8;
  --accent-dim: rgba(14,165,233,.2);
  --success: #22c55e;
  --warning: #f59e0b;
  --danger: #ef4444;
  --btn-bg: rgba(15,23,42,.8);
  --input-bg: rgba(15,23,42,.8);
  --canvas-info-bg: rgba(15,23,42,.6);
  --toast-bg-info: rgba(14,165,233,.92);
  --toast-bg-success: rgba(34,197,94,.92);
  --toast-bg-error: rgba(239,68,68,.92);
  --header-border: rgba(14,165,233,.1);
  --header-bg: linear-gradient(180deg,rgba(14,165,233,.04) 0%,transparent 100%);
  --dropzone-hover: rgba(14,165,233,.04);
  --dropzone-dragover: rgba(14,165,233,.08);
  --card-bg: rgba(15,23,42,.5);
  --preview-bg: #fff;
  --overlay-bg: rgba(8,12,22,.7);
  --modal-bg: #1a202c;
  --modal-border: rgba(14,165,233,.2);
}

/* 浅色主题变量覆盖 */
body.light-theme {
  --bg-primary: #f8fafc;
  --bg-secondary: rgba(255,255,255,.7);
  --bg-sidebar: rgba(255,255,255,.5);
  --border-color: rgba(0,0,0,.08);
  --text-primary: #1e293b;
  --text-secondary: #475569;
  --text-muted: #94a3b8;
  --accent: #0284c7;
  --accent-dim: rgba(2,132,199,.15);
  --success: #16a34a;
  --warning: #d97706;
  --danger: #dc2626;
  --btn-bg: rgba(255,255,255,.9);
  --input-bg: rgba(255,255,255,.9);
  --canvas-info-bg: rgba(241,245,249,.8);
  --toast-bg-info: rgba(2,132,199,.92);
  --toast-bg-success: rgba(22,163,74,.92);
  --toast-bg-error: rgba(220,38,38,.92);
  --header-border: rgba(0,0,0,.06);
  --header-bg: linear-gradient(180deg,rgba(2,132,199,.03) 0%,transparent 100%);
  --dropzone-hover: rgba(2,132,199,.04);
  --dropzone-dragover: rgba(2,132,199,.08);
  --card-bg: rgba(255,255,255,.6);
  --preview-bg: #ffffff;
  --overlay-bg: rgba(0,0,0,.4);
  --modal-bg: #ffffff;
  --modal-border: rgba(0,0,0,.1);
}

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:14px;-webkit-font-smoothing:antialiased}
body{
  font-family:'Noto Sans SC',sans-serif;
  background:var(--bg-primary);
  color:var(--text-primary);
  min-height:100vh;
  overflow-x:hidden;
  transition: background .3s, color .3s;
}
body::before{
  content:'';
  position:fixed;
  inset:0;
  background-image:linear-gradient(rgba(14,165,233,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(14,165,233,.025) 1px,transparent 1px);
  background-size:32px 32px;
  pointer-events:none;
  z-index:0;
}
.app{position:relative;z-index:1}
.app-header{
  padding:28px 40px;
  border-bottom:1px solid var(--header-border);
  background:var(--header-bg);
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition: background .3s, border .3s;
}
.header-left h1{
  font-size:22px;
  font-weight:700;
  background:linear-gradient(135deg,var(--text-primary) 40%,var(--accent));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.subtitle{margin-top:3px;color:var(--text-muted);font-size:12px;letter-spacing:.03em}
.title-row{display:flex;align-items:center;gap:10px}    
.logo-img{height:22px;width:auto;display:inline-block;vertical-align:middle}  
.header-actions{display:flex;gap:10px;align-items:center}
.icon-btn{
  width:36px;height:36px;
  border-radius:50%;
  border:1px solid var(--border-color);
  background:var(--btn-bg);
  color:var(--text-secondary);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .2s;
  backdrop-filter:blur(4px);
}
.icon-btn:hover{background:var(--accent-dim);color:var(--accent)}
.icon-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.app-main{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 85px)}
.sidebar{
  padding:24px 20px;
  border-right:1px solid var(--border-color);
  background:var(--bg-sidebar);
  position:sticky;top:0;height:100vh;overflow-y:auto;
  transition: background .3s, border .3s;
}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:rgba(14,165,233,.2);border-radius:2px}
.sidebar-section h3{
  font-size:11px;text-transform:uppercase;letter-spacing:.08em;
  color:var(--text-muted);margin-bottom:16px;padding-bottom:8px;
  border-bottom:1px solid var(--border-color);transition:border .3s;
}
.setting{margin-bottom:18px}
.setting>label{
  display:block;font-size:12px;font-weight:500;
  color:var(--text-secondary);margin-bottom:7px;letter-spacing:.04em;
}
.btn-group{display:flex;gap:3px;background:var(--btn-bg);border-radius:7px;padding:3px}
.btn-group button{
  flex:1;padding:6px 4px;border:none;background:transparent;
  color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:12px;
  border-radius:5px;cursor:pointer;transition:all .2s;
}
.btn-group button.active{background:var(--accent-dim);color:var(--accent)}
.btn-group button:hover:not(.active){color:var(--text-secondary)}
.canvas-info{margin-top:8px;font-size:12px;color:var(--text-secondary);font-family:'JetBrains Mono',monospace}
.canvas-info .val{color:var(--text-primary)}
.dim-inputs{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.dim-input{display:flex;flex-direction:column;align-items:center;gap:3px}
.dim-input .sym{
  font-family:'JetBrains Mono',monospace;font-weight:600;
  color:var(--accent);font-size:13px;
}
.dim-input input{
  width:100%;padding:7px 6px;background:var(--input-bg);
  border:1px solid var(--border-color);border-radius:5px;
  color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-size:13px;
  text-align:center;outline:none;transition:border-color .2s,background .3s;
}
.dim-input input:focus{border-color:#0ea5e9}
.dim-input small{font-size:11px;color:var(--text-secondary)}
input[type=range]{
  width:100%;-webkit-appearance:none;height:3px;
  background:rgba(14,165,233,.15);border-radius:2px;outline:none;margin:6px 0;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:#0ea5e9;cursor:pointer;box-shadow:0 0 6px rgba(14,165,233,.4);
}
.range-info{display:flex;justify-content:space-between;font-size:11px;color:var(--text-secondary);margin-top:2px}
.range-info .val{color:var(--text-primary);font-family:'JetBrains Mono',monospace;font-weight:600}
.content{padding:28px 36px}
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.section-header h2{font-size:16px;font-weight:600;color:var(--text-primary)}
.section-header .badge{
  font-size:11px;padding:2px 8px;border-radius:10px;
  background:var(--accent-dim);color:var(--accent);
  font-family:'JetBrains Mono',monospace;
}
.btn-batch{
  margin-left:auto;padding:6px 14px;
  background:var(--accent-dim);border:1px solid rgba(14,165,233,.2);
  border-radius:6px;color:var(--accent);font-size:12px;
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.btn-batch:hover{background:rgba(14,165,233,.2)}
.view-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.upload-card{
  background:var(--card-bg);border:1px solid var(--border-color);
  border-radius:9px;overflow:hidden;transition:border-color .3s,box-shadow .3s,background .3s;
}
.upload-card:hover{border-color:rgba(14,165,233,.25)}
.upload-card.has-file{border-color:rgba(34,197,94,.3)}
.card-label{
  padding:9px 12px;background:rgba(14,165,233,.04);
  border-bottom:1px solid var(--border-color);
  display:flex;justify-content:space-between;align-items:center;
  transition:border .3s;
}
.card-label .zh{font-weight:500;font-size:13px}
.card-label .en{color:var(--text-muted);font-family:'JetBrains Mono',monospace;font-size:10px;text-transform:uppercase}
.dropzone{
  aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;
  cursor:pointer;position:relative;transition:background .2s;
}
.dropzone:hover{background:var(--dropzone-hover)}
.dropzone.dragover{background:var(--dropzone-dragover)}
.dropzone-content{text-align:center;color:var(--text-muted);pointer-events:none}
.dropzone-content svg{width:28px;height:28px;margin-bottom:6px;opacity:.4}
.dropzone-content p{font-size:12px}
.dropzone .preview-wrap{
  position:absolute;inset:6px;display:flex;align-items:center;justify-content:center;
  background:rgba(10,15,26,.85);border-radius:5px;overflow:hidden;
}
.dropzone .preview-wrap img{max-width:100%;max-height:100%;object-fit:contain}
.remove-btn{
  position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;
  border:none;background:rgba(239,68,68,.85);color:#fff;font-size:15px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .2s;line-height:1;
}
.dropzone .preview-wrap:hover .remove-btn{opacity:1}
.action-bar{display:flex;gap:12px;margin:24px 0;align-items:center}
.btn-process{
  display:inline-flex;align-items:center;gap:8px;padding:11px 28px;
  background:linear-gradient(135deg,#0ea5e9,#0284c7);border:none;
  border-radius:8px;color:#fff;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .3s;box-shadow:0 4px 14px rgba(14,165,233,.3);
  font-family:inherit;
}
.btn-process:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 20px rgba(14,165,233,.4)}
.btn-process:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
.btn-process svg{width:16px;height:16px}
.btn-reset{
  padding:11px 20px;background:transparent;
  border:1px solid var(--border-color);border-radius:8px;
  color:var(--text-muted);font-size:13px;cursor:pointer;
  transition:all .2s;font-family:inherit;
}
.btn-reset:hover{border-color:rgba(14,165,233,.3);color:var(--text-secondary)}
.preview-area{margin-top:12px;display:none}
.preview-area.show{display:block;animation:fadeIn .4s ease}
.preview-actions{margin-left:auto;display:flex;gap:10px;align-items:center}
.preview-actions select{
  padding:5px 10px;background:var(--input-bg);
  border:1px solid var(--border-color);border-radius:5px;
  color:var(--text-primary);font-size:12px;
  font-family:'JetBrains Mono',monospace;outline:none;
}
.btn-download-all{
  padding:8px 18px;background:rgba(34,197,94,.12);
  border:1px solid rgba(34,197,94,.25);border-radius:7px;
  color:var(--success);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;font-family:inherit;
}
.btn-download-all:hover{background:rgba(34,197,94,.22)}
.preview-card{
  background:var(--card-bg);border:1px solid var(--border-color);
  border-radius:9px;overflow:hidden;transition:background .3s,border .3s;
}
.preview-canvas-wrap{
  padding:10px;background:var(--preview-bg);
  display:flex;align-items:center;justify-content:center;min-height:120px;
}
.preview-canvas-wrap canvas{max-width:100%;max-height:260px;display:block}
.card-footer{padding:8px 12px;display:flex;justify-content:space-between;align-items:center}
.card-footer .size-info{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-secondary)}
.btn-dl{
  padding:5px 12px;background:var(--accent-dim);
  border:1px solid rgba(14,165,233,.2);border-radius:5px;
  color:var(--accent);font-size:12px;cursor:pointer;
  transition:all .2s;font-family:inherit;
}
.btn-dl:hover{background:rgba(14,165,233,.2)}
.toast{
  position:fixed;top:20px;right:20px;padding:12px 22px;border-radius:8px;
  font-size:13px;z-index:1000;transform:translateX(130%);
  transition:transform .3s ease;box-shadow:0 8px 24px rgba(0,0,0,.4);
}
.toast.show{transform:translateX(0)}
.toast-info{background:var(--toast-bg-info);color:#fff}
.toast-success{background:var(--toast-bg-success);color:#fff}
.toast-error{background:var(--toast-bg-error);color:#fff}
/* 模态框 */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;
  z-index:999;opacity:0;visibility:hidden;transition:all .3s;
}
.modal-overlay.show{opacity:1;visibility:visible}
.modal-dialog{
  background:var(--modal-bg);border:1px solid var(--modal-border);
  border-radius:12px;padding:28px 32px;min-width:300px;
  box-shadow:0 20px 40px rgba(0,0,0,.3);
  position:relative;transition:background .3s;
}
.modal-close{
  position:absolute;top:12px;right:16px;
  background:none;border:none;font-size:22px;
  color:var(--text-muted);cursor:pointer;line-height:1;
  transition:color .2s;
}
.modal-close:hover{color:var(--text-primary)}
.modal-body{text-align:center;color:var(--text-primary);font-size:16px;}
.modal-body strong{color:var(--accent);font-size:20px;}

.param-note { margin-top: 8px; font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
.param-note strong { color: var(--text-primary); font-weight: 500; }
.param-note p + p { margin-top: 6px; }

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:1024px){.app-main{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border-color)}.content{padding:20px}}
@media(max-width:640px){.view-grid{grid-template-columns:repeat(2,1fr)}.content{padding:14px}}
</style>
</head>

<script>
const VIEWS=[
  {key:'front',  zh:'主视图',en:'Front',  dims:(L,W,H)=>({w:W,h:H})},
  {key:'back',   zh:'后视图',en:'Back',   dims:(L,W,H)=>({w:W,h:H})},
  {key:'left',   zh:'左视图',en:'Left',   dims:(L,W,H)=>({w:L,h:H})},
  {key:'right',  zh:'右视图',en:'Right',  dims:(L,W,H)=>({w:L,h:H})},
  {key:'top',    zh:'俯视图',en:'Top',    dims:(L,W,H)=>({w:W,h:L})},
  {key:'bottom', zh:'仰视图',en:'Bottom', dims:(L,W,H)=>({w:W,h:L})}
];
const CW=16.5, CH=24.5;
const S={
  dpi:300,
  calibW:80, calibH:50,
  sens:25, margin:5,
  views:{},
  outputs:{}
};

function px(dpi){const c=1/2.54;return{w:Math.round(CW*c*dpi),h:Math.round(CH*c*dpi)}}
function toast(msg,type='info'){const t=document.createElement('div');t.className='toast toast-'+type;t.textContent=msg;document.body.appendChild(t);requestAnimationFrame(()=>t.classList.add('show'));setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300)},3000)}

/* 主题切换 */
const themeBtn = document.getElementById('theme-toggle');
themeBtn.addEventListener('click', () => {
  document.body.classList.toggle('light-theme');
});

/* 联系方式弹窗 */
const contactBtn = document.getElementById('contact-btn');
const modal = document.getElementById('contact-modal');
const closeBtn = document.getElementById('modal-close-btn');
contactBtn.addEventListener('click', () => modal.classList.add('show'));
closeBtn.addEventListener('click', () => modal.classList.remove('show'));
modal.addEventListener('click', (e) => { if(e.target === modal) modal.classList.remove('show'); });

function init(){
  buildUploadGrid();
  bindSettings();
  bindActions();
  updateCanvasInfo();
}

function buildUploadGrid(){
  const g=document.getElementById('upload-grid');
  g.innerHTML=VIEWS.map(v=>`
    <div class="upload-card" data-view="${v.key}">
      <div class="card-label"><span class="zh">${v.zh}</span><span class="en">${v.en}</span></div>
      <div class="dropzone" data-view="${v.key}">
        <input type="file" accept="image/*" hidden>
        <div class="dropzone-content">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <p>点击或拖拽上传</p>
        </div>
        <div class="preview-wrap" hidden><img><button class="remove-btn" title="移除">&times;</button></div>
      </div>
    </div>`).join('');

  g.querySelectorAll('.dropzone').forEach(dz=>{
    const vk=dz.dataset.view,fi=dz.querySelector('input[type=file]');
    dz.addEventListener('click',e=>{if(e.target.closest('.remove-btn'))return;fi.click()});
    fi.addEventListener('change',e=>{if(e.target.files[0])upload(vk,e.target.files[0])});
    dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('dragover')});
    dz.addEventListener('dragleave',()=>dz.classList.remove('dragover'));
    dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('dragover');if(e.dataTransfer.files[0])upload(vk,e.dataTransfer.files[0])});
    dz.querySelector('.remove-btn').addEventListener('click',e=>{e.stopPropagation();remove(vk)});
  });
}

function upload(vk, file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        S.views[vk] = { file, img };
        refreshCard(vk);
        res();
      };
      img.onerror = () => {
        toast(`“${vk}”视图的图片加载失败，请检查文件是否完整`, 'error');
        rej(new Error('Image load failed'));
      };
      img.src = r.result;
    };
    r.onerror = () => {
      toast(`“${vk}”视图的文件读取失败`, 'error');
      rej(new Error('File read failed'));
    };
    r.readAsDataURL(file);
  });
}

function refreshCard(vk) {
  const dz = document.querySelector(`.dropzone[data-view="${vk}"]`);
  if (!dz) return;
  const pw = dz.querySelector('.preview-wrap');
  const dc = dz.querySelector('.dropzone-content');
  const img = pw.querySelector('img');
  const card = dz.closest('.upload-card');

  const viewData = S.views[vk];

  if (viewData && viewData.img && viewData.img.src) {
    // 有视图：显示预览
    img.src = viewData.img.src;
    pw.hidden = false;
    dc.hidden = true;
    card.classList.add('has-file');
  } else {
    // 无视图：恢复到初始状态（彻底清除残留图片）
    if (img) img.removeAttribute('src');
    pw.hidden = true;
    dc.hidden = false;
    card.classList.remove('has-file');
  }
  updateCount();
}

function remove(vk){delete S.views[vk];refreshCard(vk);updateCount()}
function updateCount(){const c=Object.keys(S.views).length;document.getElementById('upload-count').textContent=c+' / 6';document.getElementById('btn-process').disabled=c<6}

function bindSettings(){
  document.querySelectorAll('#dpi-group button').forEach(b=>b.addEventListener('click',()=>{
    document.querySelectorAll('#dpi-group button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');S.dpi=+b.dataset.dpi;updateCanvasInfo();
  }));
  document.getElementById('calib-w').addEventListener('input',e=>{S.calibW=parseFloat(e.target.value)||1});
  document.getElementById('calib-h').addEventListener('input',e=>{S.calibH=parseFloat(e.target.value)||1});
  const ss=document.getElementById('sensitivity');ss.addEventListener('input',()=>{S.sens=+ss.value;document.getElementById('sens-val').textContent=S.sens});
  const ms=document.getElementById('margin');ms.addEventListener('input',()=>{S.margin=parseFloat(ms.value);document.getElementById('margin-val').textContent=S.margin+' mm'});
  document.getElementById('btn-batch').addEventListener('click',()=>document.getElementById('batch-input').click());
  document.getElementById('batch-input').addEventListener('change',async e=>{const files=[...e.target.files];await batchAssign(files);e.target.value=''});
  document.getElementById('upload-grid').addEventListener('dragover',e=>e.preventDefault());
  document.getElementById('upload-grid').addEventListener('drop',async e=>{
    e.preventDefault();
    const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'));
    if(files.length)await batchAssign(files);
  });
}

function updateCanvasInfo(){const p=px(S.dpi);document.getElementById('canvas-dims').textContent=p.w+' × '+p.h}

function guessType(fn){const n=fn.toLowerCase();
  if(/主视|front|正/.test(n))return'front';if(/后视|back|rear/.test(n))return'back';
  if(/左视|left/.test(n))return'left';if(/右视|right/.test(n))return'right';
  if(/俯视|top|上/.test(n))return'top';if(/仰视|bottom|下/.test(n))return'bottom';return null}
async function batchAssign(files){
  const asgn={},unas=[];
  for(const f of files){const t=guessType(f.name);if(t&&!asgn[t])asgn[t]=f;else unas.push(f)}
  for(const v of VIEWS)if(!asgn[v.key]&&unas.length)asgn[v.key]=unas.shift();
  for(const[k,f]of Object.entries(asgn))await upload(k,f);
  toast('已上传 '+Object.keys(asgn).length+' 个视图','success');
}

function bindActions(){
  document.getElementById('btn-process').addEventListener('click',processAll);
  document.getElementById('btn-reset').addEventListener('click',resetAll);
  document.getElementById('btn-dl-all').addEventListener('click',downloadAll);
}

/* ---- Content Detection ---- */
function detectBounds(srcCanvas,threshold){
  const MAX=2000;let cv=srcCanvas,sc=1;
  if(srcCanvas.width>MAX||srcCanvas.height>MAX){
    sc=MAX/Math.max(srcCanvas.width,srcCanvas.height);
    cv=document.createElement('canvas');cv.width=Math.round(srcCanvas.width*sc);cv.height=Math.round(srcCanvas.height*sc);
    cv.getContext('2d').drawImage(srcCanvas,0,0,cv.width,cv.height);
  }
  const ctx=cv.getContext('2d'),id=ctx.getImageData(0,0,cv.width,cv.height),d=id.data,w=cv.width,h=cv.height;
  const ss=Math.max(3,Math.floor(Math.min(w,h)*.02));
  let bR=0,bG=0,bB=0,bc=0;
  for(let dy=0;dy<ss;dy++)for(let dx=0;dx<ss;dx++){
    [(dy*w+dx)*4,(dy*w+(w-1-dx))*4,((h-1-dy)*w+dx)*4,((h-1-dy)*w+(w-1-dx))*4].forEach(i=>{bR+=d[i];bG+=d[i+1];bB+=d[i+2];bc++});
  }
  bR/=bc;bG/=bc;bB/=bc;
  let top=h,bot=0,lft=w,rgt=0;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){const i=(y*w+x)*4;const dr=d[i]-bR,dg=d[i+1]-bG,db=d[i+2]-bB;
    if(Math.sqrt(dr*dr+dg*dg+db*db)>threshold){if(y<top)top=y;if(y>bot)bot=y;if(x<lft)lft=x;if(x>rgt)rgt=x}}
  if(sc!==1){top=Math.round(top/sc);bot=Math.round(bot/sc);lft=Math.round(lft/sc);rgt=Math.round(rgt/sc)}
  const ow=srcCanvas.width,oh=srcCanvas.height;
  if(top>=oh||lft>=ow)return{x:0,y:0,w:ow,h:oh,detected:false};
  const pad=2;
  lft=Math.max(0,lft-pad);top=Math.max(0,top-pad);rgt=Math.min(ow-1,rgt+pad);bot=Math.min(oh-1,bot+pad);
  return{x:lft,y:top,w:rgt-lft+1,h:bot-top+1,detected:true};
}

/* ---- Processing ---- */
async function processAll(){
  const btn=document.getElementById('btn-process');
  btn.disabled=true;btn.textContent='处理中…';
  await new Promise(r=>setTimeout(r,60));
  try{_process();toast('处理完成','success')}catch(e){console.error(e);toast('处理出错：'+e.message,'error')}
  btn.disabled=false;btn.innerHTML='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><circle cx="12" cy="12" r="3"/><path d="M12 1v2m0 18v2m-9-11h2m18 0h2m-3.3-6.7-1.4 1.4M6.7 17.3l-1.4 1.4m0-13.4 1.4 1.4m10.6 10.6 1.4 1.4"/></svg> 开始处理';
}

function _process(){
  const cd=px(S.dpi),mp=Math.round(S.margin/25.4*S.dpi),uw=cd.w-2*mp,uh=cd.h-2*mp;
  const bounds={};
  for(const v of VIEWS){
    const view=S.views[v.key];if(!view)continue;
    const tc=document.createElement('canvas');tc.width=view.img.naturalWidth;tc.height=view.img.naturalHeight;
    tc.getContext('2d').drawImage(view.img,0,0);
    bounds[v.key]=detectBounds(tc,S.sens);
  }

  const frontBounds = bounds['front'];
  if(!S.views['front'] || !frontBounds) throw new Error('请先上传主视图');
  if(!frontBounds.detected) throw new Error('主视图未检测到产品轮廓，请调整背景识别灵敏度或更换图片');
  const w_px = frontBounds.w, h_px = frontBounds.h;
  if(w_px <= 0 || h_px <= 0) throw new Error('主视图内容尺寸异常');
  const scaleW = S.calibW / w_px, scaleH = S.calibH / h_px;
  const scale = (scaleW + scaleH) / 2;

  let l_px = null;
  for(const key of ['left','right','top','bottom']){
    const b = bounds[key];
    if(b && b.w > 0 && b.detected){ l_px = (key==='top'||key==='bottom') ? b.h : b.w; break; }
  }
  if(l_px === null) throw new Error('所有侧面视图均未检测到有效产品轮廓，无法推算长度(L)');
  const L = Math.round(l_px * scale), W = S.calibW, H = S.calibH;

  let ms=Infinity;
  for(const v of VIEWS){const d=v.dims(L,W,H);ms=Math.min(ms,uw/(d.w/25.4*S.dpi),uh/(d.h/25.4*S.dpi))}
  const uscale = ms;

  S.outputs={};
  for(const v of VIEWS){
    const view=S.views[v.key]; if(!view) continue;
    const b=bounds[v.key], d=v.dims(L,W,H);
    const tw=Math.round(d.w/25.4*S.dpi*uscale), th=Math.round(d.h/25.4*S.dpi*uscale);
    const sc=document.createElement('canvas');sc.width=view.img.naturalWidth;sc.height=view.img.naturalHeight;
    sc.getContext('2d').drawImage(view.img,0,0);
    const oc=document.createElement('canvas');oc.width=cd.w;oc.height=cd.h;
    const ox=oc.getContext('2d');
    ox.fillStyle='#ffffff';ox.fillRect(0,0,cd.w,cd.h);
    const dw=tw, dh=th, dx=Math.round((cd.w-dw)/2), dy=Math.round((cd.h-dh)/2);
    ox.imageSmoothingEnabled=true;ox.imageSmoothingQuality='high';
    ox.drawImage(sc,b.x,b.y,b.w,b.h,dx,dy,dw,dh);
    S.outputs[v.key]={canvas:oc,contentW:dw,contentH:dh,detected:b.detected};
  }
  renderPreviews();
  document.getElementById('preview-area').classList.add('show');
  document.getElementById('preview-area').scrollIntoView({behavior:'smooth'});
}

function renderPreviews(){
  const g=document.getElementById('preview-grid');g.innerHTML='';
  VIEWS.forEach((v,i)=>{
    const o=S.outputs[v.key];if(!o)return;
    const card=document.createElement('div');card.className='preview-card';
    card.style.animationDelay=i*0.06+'s';card.style.animation='fadeIn .4s ease forwards';card.style.opacity='0';
    const warn=o.detected?'':'<span style="color:#f59e0b;font-size:10px;margin-left:6px">⚠ 未检测到明确边界</span>';
    card.innerHTML=`
      <div class="card-label"><span class="zh">${v.zh}${warn}</span><span class="en">${v.en}</span></div>
      <div class="preview-canvas-wrap"></div>
      <div class="card-footer"><span class="size-info">${o.contentW}×${o.contentH} px</span><button class="btn-dl" data-view="${v.key}">下载</button></div>`;
    const wrap=card.querySelector('.preview-canvas-wrap');
    const cv=document.createElement('canvas');
    const PMAX=600,ps=Math.min(PMAX/o.canvas.width,PMAX/o.canvas.height,1);
    cv.width=Math.round(o.canvas.width*ps);cv.height=Math.round(o.canvas.height*ps);
    cv.getContext('2d').drawImage(o.canvas,0,0,cv.width,cv.height);
    wrap.appendChild(cv);
    card.querySelector('.btn-dl').addEventListener('click',()=>dlView(v.key));
    g.appendChild(card);
  });
}

function dlView(vk){
  const o=S.outputs[vk];if(!o)return;
  const fmt=document.getElementById('dl-format').value;
  const mime=fmt==='jpeg'?'image/jpeg':'image/png',ext=fmt==='jpeg'?'.jpg':'.png';
  const vc=VIEWS.find(v=>v.key===vk);
  o.canvas.toBlob(blob=>{const u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=vc.zh+ext;a.click();URL.revokeObjectURL(u)},mime,.95);
}

async function downloadAll(){for(const v of VIEWS){if(S.outputs[v.key]){dlView(v.key);await new Promise(r=>setTimeout(r,250))}}}

function resetAll(){
  S.views={};S.outputs={};VIEWS.forEach(v=>refreshCard(v.key));
  document.getElementById('preview-area').classList.remove('show');
  document.querySelectorAll('.dropzone input[type=file]').forEach(i=>i.value='');
  updateCount();
}

document.addEventListener('DOMContentLoaded',init);
</script>
